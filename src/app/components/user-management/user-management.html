<div class="w-full mx-auto min-h-screen flex flex-col gap-10">
    <div class="w-full h-[72px] flex flex-col gap-[8px]">
        <h1 class="text-[30px] font-[800] leading-[36px] tracking-[-0.75px] text-[#141B2B]">
            Coupons & Affiliates
        </h1>
        <p class="text-[18px] font-[400] leading-[28px] text-[#464555]">
            Manage promotional campaigns and strategic partnerships.
        </p>
    </div>
    <div class="rounded-[12px] overflow-hidden">
        <div class="flex items-center justify-between h-[40px]">
            <div class="flex items-center gap-[10px]">
                <p class="text-[18px] font-[600] text-[#141B2B]">
                    Users List
                </p>
                <span class="px-[10px] py-[2px] bg-[#E2E8F0] text-[12px] rounded-full text-[#64748B]">
                    {{ users.length }} Users
                </span>
            </div>
            <button (click)="isAddUserOpen = true"
                class="px-[16px] py-[8px] bg-[#E1E8FD] rounded-[8px] text-[#3525CD] text-[12px] font-[700] flex items-center gap-[6px]">
                <i class="fa-solid fa-plus text-[10px]"></i>
                Add User
            </button>
        </div>
        <div class="mt-6 bg-white rounded-xl border border-gray-200 overflow-hidden">
            <table class="w-full border-collapse">
                <thead class="bg-[#F1F3FF80]">
                    <tr class="h-[48px]">
                        <th class="px-6 text-left text-[12px] font-[700] uppercase text-[#464555B2]">
                            User
                        </th>
                        <th class="text-left text-[12px] font-[700] uppercase text-[#464555B2]">
                            Role
                        </th>
                        <th class="text-left text-[12px] font-[700] uppercase text-[#464555B2]">
                            Email
                        </th>
                        <th class="text-left text-[12px] font-[700] uppercase text-[#464555B2]">
                            Status
                        </th>
                        <th class="text-right pr-6 text-[12px] font-[700] uppercase text-[#464555B2]">
                            Actions
                        </th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr *ngFor="let user of users" class="h-[72px]">
                        <td class="px-6">
                            <div class="flex items-center gap-[8px] w-[180px] h-[24px]">
                                <img [src]="user.avatar" class="w-[28px] h-[28px] rounded-full" />
                                <span class="font-[700] text-[16px] text-[#141B2B]">
                                    {{ user.name }}
                                </span>
                            </div>
                        </td>
                        <td class="font-[600] text-[16px]">
                            {{ user.role }}
                        </td>
                        <td class="text-[#464555] text-[14px]">
                            {{ user.email }}
                        </td>
                        <td>
                            <span
                                class="inline-flex items-center justify-center w-[70px] h-[20px] px-[10px] py-[2px] rounded-[9999px]"
                                [ngClass]="{
                        'bg-[#6FFBBE]': user.status === 'Active',
                        'bg-[#FECACA]': user.status === 'Inactive'
                    }">
                                <span class="text-[12px] font-bold" [ngClass]="{
                            'text-[#005236]': user.status === 'Active',
                            'text-[#991B1B]': user.status === 'Inactive'
                        }">
                                    {{ user.status }}
                                </span>
                            </span>
                        </td>
                        <td class="pr-6">
                            <div class="flex justify-end items-center gap-3">
                                <button
                                    class="flex items-center gap-1 px-3 h-[28px] rounded-lg bg-[#4F46E5] text-white text-[12px] font-[700]">
                                    Detail
                                </button>
                                <button class="text-[red] text-[12px] font-[700]">
                                    Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-between items-center px-[16px] py-[14px] text-[12px] text-[#64748B] bg-[#F1F3FF4D]">
            <span>Showing {{ users.length }} users</span>
        </div>
    </div>
</div>

<!-- Overlay -->
<div *ngIf="isAddUserOpen" (click)="isAddUserOpen=false"
    class="fixed inset-0 bg-black/40 backdrop-blur-[6px] z-40 transition-all">
</div>

<!-- Modal -->
<div *ngIf="isAddUserOpen" class="fixed inset-0 flex items-center justify-center z-50">

    <div class="w-[440px] bg-white rounded-[20px] p-[24px] shadow-[0px_50px_100px_rgba(0,0,0,0.25)] relative">

        <!-- Top Glow -->
        <div class="absolute top-0 left-0 w-full h-[6px] bg-gradient-to-r from-[#3525CD] to-[#6366F1] rounded-t-[20px]">
        </div>

        <!-- Header -->
        <div class="flex justify-between items-center mb-5 mt-2">

            <div>
                <h2 class="text-[20px] font-[800] text-[#141B2B]">
                    Add New User
                </h2>
                <p class="text-[12px] text-[#64748B]">
                    Create and assign roles instantly
                </p>
            </div>

            <div (click)="isAddUserOpen=false"
                class="w-[32px] h-[32px] flex items-center justify-center rounded-full hover:bg-[#F1F3FF] cursor-pointer transition">
                <i class="fa-solid fa-xmark text-[#64748B]"></i>
            </div>

        </div>

        <!-- Form -->
        <div class="flex flex-col gap-4">

            <!-- Input Group -->
            <div class="flex flex-col gap-[6px]">
                <label class="text-[11px] font-[700] uppercase text-[#64748B]">
                    User Name
                </label>

                <input type="text" placeholder="Enter full name"
                    class="h-[42px] px-3 bg-[#F8FAFF] border border-[#E2E8F0] rounded-[10px] text-[13px] focus:border-[#3525CD] focus:ring-2 focus:ring-[#3525CD1A] outline-none transition" />
            </div>

            <div class="flex flex-col gap-[6px]">
                <label class="text-[11px] font-[700] uppercase text-[#64748B]">
                    Email
                </label>

                <input type="email" placeholder="example@email.com"
                    class="h-[42px] px-3 bg-[#F8FAFF] border border-[#E2E8F0] rounded-[10px] text-[13px] focus:border-[#3525CD] focus:ring-2 focus:ring-[#3525CD1A] outline-none transition" />
            </div>

            <div class="flex gap-3">

                <!-- Role -->
                <div class="flex-1 flex flex-col gap-[6px]">
                    <label class="text-[11px] font-[700] uppercase text-[#64748B]">
                        Role
                    </label>

                    <input type="text" placeholder="Admin / Manager"
                        class="h-[42px] px-3 bg-[#F8FAFF] border border-[#E2E8F0] rounded-[10px] text-[13px] focus:border-[#3525CD] focus:ring-2 focus:ring-[#3525CD1A] outline-none transition" />
                </div>

                <!-- Status -->
                <div class="flex-1 flex flex-col gap-[6px]">
                    <label class="text-[11px] font-[700] uppercase text-[#64748B]">
                        Status
                    </label>

                    <select
                        class="h-[42px] px-3 bg-[#F8FAFF] border border-[#E2E8F0] rounded-[10px] text-[13px] focus:border-[#3525CD] outline-none">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>

            </div>

        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mt-6">

            <button (click)="isAddUserOpen=false"
                class="flex-1 h-[42px] bg-[#F1F5F9] rounded-[10px] text-[13px] font-[600] hover:bg-[#E2E8F0] transition">
                Cancel
            </button>

            <button
                class="flex-1 h-[42px] bg-gradient-to-r from-[#3525CD] to-[#6366F1] text-white rounded-[10px] text-[13px] font-[700] shadow-md hover:opacity-90 transition">
                Add User
            </button>

        </div>

    </div>

</div>
